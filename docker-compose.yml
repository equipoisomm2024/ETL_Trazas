version: '3.9'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: logpuller
      POSTGRES_PASSWORD: password
      POSTGRES_DB: logpuller
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U logpuller']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    env_file: ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./sample_logs:/var/logs:ro
    ports:
      - '8000:8000'
    command: python -m app.run

volumes:
  pgdata:
